{% load static %}

<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalhes do Cliente</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
  <link rel="stylesheet" href="{% static 'css/cliente_detalhes.css' %}">
</head>
<body>
<a href="/" class="btn-voltar-fixo">
    <i class="fa fa-home"></i> Voltar
</a>
<div id="tabs">
  <ul>
    <li><a href="#tabs-1">Identificação</a></li>
  </ul>
    <div id="tabs-1">
    <table class="object_view">
        <tbody>
            <tr>
                <td class="col_field">Nome</td>
                <td class="col_data col_data_double">
                    <input type="text" name="nome" class="edit-input" value="" maxlength="200">
                </td>
                <td class="col_field">
                    Nº Contribuinte
                </td>
                <td class="col_data col_data_double">
                    <input type="text" name="contribuinte" class="edit-input" value="" maxlength="12">
                </td>
            </tr>

            <tr>
                <td class="col_field">Morada-1</td>
                <td class="col_data col_data_double">
                    <input type="text" name="morada1" class="edit-input" value="" maxlength="100">
                </td>
                <td class="col_field">Morada-2</td>
                <td class="col_data col_data_double">

                    <input type="text" name="morada2" class="edit-input" value="" maxlength="100">
                </td>
            </tr>

            <tr>
                <td class="col_field">Código Postal</td>
                <td class="col_data col_data_double">
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="text" id="postal" name="codigo_postal" class="edit-input" value="" maxlength="8" style="flex: 1;">
                        <div id="loading-postal" style="display: none; margin-left: 8px;">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </td>
                <td class="col_field">Telemóvel</td>
                <td class="col_data col_data_double">
                    <input type="text" name="telemovel" class="edit-input" value="" maxlength="12">
                </td>
            </tr>

            <tr>
                <td class="col_field">Sigla</td>
                <td class="col_data">
                    <input type="hidden" id="sigla" name="sigla" value="" maxlength="2">
                    <span id="sigla-text" style="font-weight: bold; margin-left: 5px;" ></span>
                </td>
                <td class="col_field">País</td>
                <td class="col_data">
                    <select id="country" name="pais" class="edit-select" >
                        <option value="">Carregando...</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td class="col_field">Distrito</td>
                <td class="col_data col_data_double">
                    <input type="text" name="distrito" class="edit-input" value="" maxlength="35">
                </td>
                <td class="col_field">Concelho</td>
                <td class="col_data col_data_double">
                    <input type="text" name="concelho" class="edit-input" value="" maxlength="35">
                </td>
            </tr>
            <tr>
                <td class="col_field">Email</td>
                <td class="col_data col_data_double">
                    <input type="text" name="email" class="edit-input" value="" maxlength="200">
                </td>
                <td class="col_field">Vendedor</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="vendedor">
                        <option value="">Selecione um Vendedor...</option> {% for v in vendedores %}
                            <option value="{{ v.id_vendedor }}">{{ v.nome }}</option>
                        {% endfor %}
                    </select>
                </td>
            </tr>
            <tr>
                <td class="col_field">Zona</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="zona">
                        <option value="">Selecione uma Zona...</option>
                        {% for z in zonas %}
                            <option value="{{ z.id_zona }}">{{ z.zona }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td class="col_field">Transporte</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="transporte">
                        <option value="">Selecione o Transporte...</option>
                        {% for t in transportes %}
                            <option value="{{ t.id_transporte }}">{{ t.descricao }}</option>
                        {% endfor %}
                    </select>
                </td>
            </tr>

            <tr>
                <td class="col_field">Impostos</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="impostos">
                        <option value="">Selecione o Regime...</option>
                        {% for i in impostos_list %}
                            <option value="{{ i.id_impostos }}">{{ i.nome }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td class="col_field">Pagamento</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="pagamento">
                        <option value="">Selecione o Pagamento...</option>
                        {% for p in pagamentos %}
                            <option value="{{ p.id_pagamento }}">{{ p.nome }}</option>
                        {% endfor %}
                    </select>
                </td>
            </tr>

            <tr>
                <td class="col_field">Modalidade</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="modalidade">
                        <option value="">Selecione a Modalidade...</option>
                        {% for m in modalidades %}
                            <option value="{{ m.id_modalidade }}">{{ m.nome }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td class="col_field">Preços</td>
                <td class="col_data col_data_double">
                    <select class="edit-select" name="precos">
                        <option value="">Selecione o Preço...</option>
                        {% for pr in precos_list %}
                            <option value="{{ pr.id_precos }}">{{ pr.nome }}</option>
                        {% endfor %}
                    </select>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="table-actions">
        <button type="button" id="btn-guardar-cliente" class="btn-save">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Guardar Alterações
        </button>
    </div>
  </div>
</div>

</body>
<script src="{% static 'js/criar.js' %}"></script>

</html>
