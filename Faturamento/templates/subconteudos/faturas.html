{% load static %}
<div class="subconteudo-item" id="faturas" style="display:none; margin-top: 20px;">
    <div class="panel panel-default" style="padding: 20px;">

        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Lista de Faturas</h2>
            <button id="btnAddFatura" class="btn btn-success">
                <i class="fa fa-plus"></i> Nova Fatura
            </button>
        </div>

        <div class="filters-bar">
            <div class="filter-search">
                <label>Pesquisar</label>
                <input type="text" id="pesquisaFaturas" class="form-control" placeholder="🔍 Nº ou Cliente...">
            </div>
            <div class="filter-select">
                <label>Estado</label>
                <select id="filtroEstado" class="form-control">
                    <option value="">Todos</option>
                    <option value="Pago">Pago</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Rascunho">Rascunho</option>
                </select>
            </div>
            <div class="filter-select">
                <label>Tipo</label>
                <select id="filtroTipo" class="form-control">
                    <option value="">Todos</option>
                    <option value="Fatura">Fatura</option>
                    <option value="Simplificada">Simplificada</option>
                    <option value="Fatura-Recibo">Fatura-Recibo</option>
                    <option value="Nota de Crédito">Nota-Crédito</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover" id="tabelaFaturas" style="width: 100%;">
                <thead>
                    <tr>
                        <th>Tipo</th>
                        <th>Número</th>
                        <th>Cliente</th>
                        <th>Emissão</th>
                        <th>Vencimento</th>
                        <th>Total</th>
                        <th>Dívida</th>
                        <th>Estado</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="faturasTabelaBody"></tbody>
            </table>
        </div>
    </div>
    <div id="modal-apagar-documento" title="Confirmar Eliminação" style="display:none;">
        <div style="padding: 10px; text-align: center;">
            <div style="font-size: 3rem; color: #f87171; margin-bottom: 10px;">⚠️</div>
            <p style="font-size: 1.1rem; color: #1e293b; font-weight: 600; margin-bottom: 5px;">Tem a certeza?</p>
            <p style="color: #64748b; font-size: 0.9rem;">Esta ação não pode ser revertida e o artigo será removido permanentemente.</p>

            <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
                <button onclick="$('#modal-apagar-documento').dialog('close');" class="btn btn-default" style="border-radius: 8px;">Cancelar</button>
                <button id="btnConfirmarEliminarDocumento" class="btn btn-danger" style="border-radius: 8px; font-weight: 600;">Sim, Eliminar</button>
            </div>
        </div>
    </div>
    <div id="modal-impressao" title="Imprimir Fatura" style="display:none;">
        <div class="modern-modal-container">
            <p style="margin-top: 10px;">Selecione a via que deseja gerar:</p>

            <div class="button-group">
                <button class="btn-via original" data-via="original">
                    <span class="icon">📄</span> Original
                </button>
                <button class="btn-via duplicado" data-via="duplicado">
                    <span class="icon">📑</span> Duplicado
                </button>
                <button class="btn-via triplicado" data-via="triplicado">
                    <span class="icon">📚</span> Triplicado
                </button>
            </div>
            <input type="hidden" id="id_fatura_imprimir">
        </div>
    </div>
    {% include "subsubconteudo/registar_fatura.html" %}
</div>
<script>
$(document).ready(function() {

    
    $('#btnAddFatura').on('click', function() {
        $('#box-registar-fatura').show();
    });

    
    $(document).on('click', function(e) {
        const modal = $('#box-registar-fatura');
        if (!$(e.target).closest('#box-registar-fatura, #btnAddFatura').length) {
            modal.hide();
        }
    });

});
</script>
<script>
$(document).on('click', '#faturasTabelaBody .btn-continue', function() {
    var id_documento_la = $(this).data('id');

    $.ajax({
        url: window.faturasUrl,
        type: 'GET',
        success: function(response) {
            var fatura = response.find(f => f.id_documento == id_documento_la);

            if (fatura) {
                var numero_doc = fatura.numero_doc;
                var cliente_id = fatura.cliente_id;

                var idField = "id_documento_" + encodeURIComponent(id_documento_la) +
                              "_numero_doc_" + encodeURIComponent(numero_doc) +
                              "_cliente_id_" + encodeURIComponent(cliente_id);

                console.log(idField);

                window.location.href = `/faturas/editar/?temp_id=${id_documento_la}&numero=${numero_doc}&cliente=${cliente_id}`;
            } else {
                console.error("Fatura não encontrada.");
            }
        },
        error: function(xhr, status, error) {
            console.error("Erro ao carregar os dados da fatura:", error);
        }
    });
});

$(document).ready(function () {

    
    $("#modal-apagar-documento").dialog({
        autoOpen: false,
        modal: true,
        width: 400,
        resizable: false,
        draggable: true,
        show: { effect: "fade", duration: 200 },
        hide: { effect: "fade", duration: 200 },
        open: function() {
            $(this).parent().focus();
        }
    });

    $(document).on('click', '#faturasTabelaBody .btn-delete-fatura-temp, #faturasTabelaBody .btn-delete-nc', function (e) {        e.preventDefault();

        const idDocumento = $(this).data('id');
        const tipoBotao = $(this).hasClass('btn-delete-nc') ? 'NC' : 'TEMP';

        if ($('#id_documento_apagar').length === 0) {
            $('body').append('<input type="hidden" id="id_documento_apagar">');
        }
        $('#id_documento_apagar').val(idDocumento);
        $('#id_documento_apagar').data('tipo', tipoBotao);

        $("#modal-apagar-documento").dialog("open");
    });

    $(document).on('click', '#btnConfirmarEliminarDocumento', function (e) {
        e.preventDefault();

        const tipoBotao = $('#id_documento_apagar').data('tipo');  

        const idDocumento = $('#id_documento_apagar').val();

        if (!idDocumento) {
            alert("Erro: O ID do documento não foi encontrado no campo oculto.");
            return;
        }

        
        $.ajax({
            url: `/apagar-documento/`,
            type: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json'
            },
            data: JSON.stringify({
                "id": idDocumento,
                "tipo": tipoBotao
            }),
            success: function(resp) {
                if (resp.success) {
                    $("#modal-apagar-documento").dialog("close");

                    if (typeof tables !== 'undefined' && tables.faturas) {
                        tables.faturas.ajax.reload(null, false);
                    } else {
                        console.warn("Tabela não encontrada para reload. A fazer refresh à página...");
                        location.reload();
                    }
                } else {
                    alert("O Django diz: " + resp.error);
                }
            },
            error: function(xhr) {
                console.error("-> Erro Crítico no AJAX:", xhr.status, xhr.responseText);
                alert("Erro de comunicação: O servidor respondeu com erro " + xhr.status);
            }
        });
    });
});

$(document).ready(function(){

    
    $('#modal-impressao').dialog({
        autoOpen: false,
        modal: true,
        width: 350,
        resizable: false,
        draggable: true
    });

    
    
    $(document).on('click', '.btn-print', function(e){
        e.preventDefault();
        e.stopPropagation();

        
        const documentoId = $(this).data('id');

        
        if ($('#id_fatura_imprimir').length === 0) {
            $('body').append('<input type="hidden" id="id_fatura_imprimir">');
        }
        $('#id_fatura_imprimir').val(documentoId);

        $('#modal-impressao').dialog('open');
    });

    
    $(document).on('click', '.btn-via', function(){
        const via = $(this).data('via');
        const documentoId = $('#id_fatura_imprimir').val();

        if (!documentoId) {
            alert("Erro: ID da fatura não encontrado.");
            return;
        }

        
        window.open(`/faturas/${documentoId}/pdf/?via=${via}`, '_blank');

        $('#modal-impressao').dialog('close');
    });
});

</script>
