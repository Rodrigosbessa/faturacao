{% load static %}
<div id="recibos" class="subconteudo-item" style="display: none; margin-top: 20px;">
    <div class="panel panel-default" style="padding: 20px;">

        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="font-family: 'Geologica', sans-serif; margin: 0; color: #333; font-weight: 600;">Lista de Recibos</h2>

            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text"
                       id="pesquisaRecibos"
                       class="form-control"
                       placeholder="🔍 Pesquisar recibo ou cliente..."
                       style="width: 250px; border-radius: 20px; padding-left: 15px;">
            </div>
        </div>

        <table id="tabelaRecibos" class="display table table-striped" style="width:100%">
            <thead>
                <tr>
                    <th>Documento</th>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody id="recibosTabelaBody">
                </tbody>
        </table>
    </div>
</div>
<div id="modal-anular-recibo" title="Anular Recibo" style="display:none;">
    <div style="padding: 10px; text-align: center;">
        <div style="font-size: 3rem; color: #f87171; margin-bottom: 10px;">⚠️</div>
        <p style="font-size: 1.1rem; color: #1e293b; font-weight: 600; margin-bottom: 5px;">Tem a certeza?</p>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 15px;">Esta ação não pode ser revertida. Indique o motivo da anulação:</p>

        <textarea
            id="motivoAnulacao"
            placeholder="Ex: Erro no valor recebido, documento emitido indevidamente..."
            style="width: 100%; height: 80px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; resize: none; font-size: 0.9rem;"
            required
        ></textarea>

        <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="$('#modal-anular-recibo').dialog('close');" class="btn btn-default" style="border-radius: 8px;">Cancelar</button>
            <button id="btnConfirmarAnularRecibo" class="btn btn-danger" style="border-radius: 8px; font-weight: 600;">Confirmar Anulação</button>
        </div>
    </div>
</div>
<script>
$(document).ready(function() {
    $("#modal-anular-recibo").dialog({
        autoOpen: false,
        modal: true,
        width: 400,
        resizable: false,
        draggable: false
    });

    $('body').on('click', '.btn-anular-recibo', function() {
        const idRecibo = $(this).data('id');

        $('#motivoAnulacao').val('');

        $('#btnConfirmarAnularRecibo').data('id', idRecibo);

        $("#modal-anular-recibo").dialog("open");
    });

    $('#btnConfirmarAnularRecibo').on('click', function() {
        const $textarea = $('#motivoAnulacao');
        const motivo = $textarea.val().trim();
        const id = $(this).data('id');

        $textarea.css('border-color', '#cbd5e1');

        if (motivo.length === 0) {
            $textarea.css('border-color', '#f87171').focus();
            return;
        }

        if (motivo.length < 10) {
            alert("Por favor, descreva o motivo com pelo menos 10 caracteres.");
            $textarea.focus();
            return;
        }

        if (motivo.length > 255) {
            alert("O motivo é demasiado longo (máximo 255 caracteres).");
            return;
        }

        enviarAnulacao(id, motivo);
    });
});

function enviarAnulacao(id, motivo) {
    const $btn = $('#btnConfirmarAnularRecibo');

    $btn.prop('disabled', true).text('A processar...');

    $.ajax({
        url: `/recibos/anular/${id}/`, //
        type: 'POST',
        data: {
            'motivo': motivo,
            'csrfmiddlewaretoken': '{{ csrf_token }}' // O Django exige isto por segurança
        },
        success: function(response) {
            if (response.success) {
                $("#modal-anular-recibo").dialog("close");

                alert(response.message);

                location.reload();
            } else {
                alert("Erro: " + response.message);
                $btn.prop('disabled', false).text('Confirmar Anulação');
            }
        },
        error: function(xhr) {
            const erroMsg = xhr.responseJSON ? xhr.responseJSON.message : "Erro na comunicação com o servidor.";
            alert("Erro crítico: " + erroMsg);
            $btn.prop('disabled', false).text('Confirmar Anulação');
        }
    });
}
</script>
