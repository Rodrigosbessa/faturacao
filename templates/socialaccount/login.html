{% load i18n %}
{% load socialaccount %}
{% load static %}

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Acesso - Google</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo_faturix.png' %}">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="grid-container" id="grid"></div>
    <div class="main-content">
        <div class="login-container">
            <h1>{% trans "Sign In Via Google" %}</h1>

            <div class="social-info">
                <p style="margin-bottom: 20px; font-size: 16px;">
                    {% blocktrans with provider.name as provider %}
                    Estás prestes a entrar em Faturix usando a tua conta <strong>{{ provider }}</strong>.
                    {% endblocktrans %}
                </p>
            </div>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-login">
                    <i class="fab fa-google"></i> {% trans "Continue" %}
                </button>
            </form>

            <p style="margin-top: 30px;">
                <a href="{% url 'account_login' %}">
                    <i class="fas fa-arrow-left"></i> Voltar ao login normal
                </a>
            </p>
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
