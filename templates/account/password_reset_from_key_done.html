{% load i18n %}
{% load account %}
{% load static %}

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Senha Alterada - Faturamento</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .success-icon {
            font-size: 60px;
            color: #28a745; /* Verde de sucesso */
            margin-bottom: 20px;
            display: block;
        }

        .info-text p {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
        }

        .btn-success {
            background: #28a745;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-success:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="login-container" style="max-width: 450px; text-align: center;">

        <i class="fas fa-check-circle success-icon"></i>

        <h1>{% trans "Change Password" %}</h1>

        <div class="info-text">
            <p>
                {% blocktrans %}A sua senha foi alterada com sucesso! Agora já pode aceder à sua conta com a nova credencial.{% endblocktrans %}
            </p>
        </div>

        <a href="{% url 'account_login' %}" class="btn-success">
            {% trans "Log In" %}
        </a>

        <p style="margin-top: 25px;">
            <small style="opacity: 0.6;">Faturix &copy; 2026</small>
        </p>
    </div>
</body>
</html>
