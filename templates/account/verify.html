{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <title>Verificação de Segurança - Faturix</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo_faturix.png' %}">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>
    <div class="grid-container" id="grid"></div>
    <div class="main-content">
        <div class="login-container">
            <h1>Segurança</h1>
            <p>Introduza o código de 6 dígitos enviado para o seu e-mail.</p>
    
            {% if messages %}
                {% for message in messages %}
                    <p style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %};">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
    
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="otp_token" placeholder="000000"
                       required maxlength="6" pattern="\d{6}"
                       style="text-align: center; letter-spacing: 5px; font-size: 20px;">
    
                <button type="submit" class="btn-login">Verificar Código</button>
            </form>
    
            <p><a href="{% url 'account_logout' %}">Sair e tentar outro utilizador</a></p>
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
