<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Confirmar E-mail</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        .container { max-width: 400px; margin: 50px auto; padding: 20px; text-align: center; font-family: sans-serif; }
        .btn-confirm { background-color: #4285F4; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="grid-container" id="grid"></div>
    <div class="main-content">
        <div class="login-container container">
            <h2>Confirmação de E-mail</h2>

            {% if confirmation %}
                <p>Por favor, confirme que o endereço <strong>{{ confirmation.email_address.email }}</strong> pertence à conta <strong>{{ user.username }}</strong>.</p>

                <form method="post" action="{% url 'account_confirm_email' confirmation.key %}">
                    {% csrf_token %}
                    <button type="submit" class="btn-confirm">Confirmar E-mail</button>
                </form>
            {% else %}
                <p>O link de confirmação é inválido ou já foi utilizado.</p>
                <a href="{% url 'account_login' %}">Voltar ao Login</a>
            {% endif %}
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
